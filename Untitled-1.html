<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontoown - Rent Today, Own Tomorrow</title>
    
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #249170;
            --light-gray: #f0f0f0;
            --white: #ffffff;
        }

        body {
            font-family: 'League Spartan', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            overflow-x: hidden;
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* 1. HERO SECTION */
        .hero {
            position: relative;
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero-nav {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            box-sizing: border-box;
        }

        .btn-signup {
            background-color: var(--primary-green);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
        }

        .hero h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 700;
            line-height: 1.1;
        }

        /* 2. BRANDING SECTION */
        .branding {
            padding: 40px 30px 20px;
            text-align: left;
        }

        .logo-main {
            height: 50px;
            margin-bottom: 20px;
        }

        .btn-discover {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 3. GAMIFICATION CARD & HOUSE VISUAL */
        .gamify-section {
            padding: 20px 30px 50px;
        }

        .gamify-card {
            background: #fff;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
            text-align: center;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-title {
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .star-box {
            background: #e8f4f1;
            color: var(--primary-green);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 10px;
        }

        .progress-container {
            background-color: #f0f0f0;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar {
            background-color: var(--primary-green);
            height: 100%;
            width: 33%; 
            transition: width 0.5s ease;
        }

        /* Status Icons */
        .status-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
        }

        .step-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 8px;
            color: #999;
            transition: 0.3s;
        }

        .step.active .step-icon {
            background: var(--primary-green);
            color: white;
        }

        .step-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #666;
        }

        /* House Image Container */
        .house-display {
            margin-top: 20px;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .house-img {
            max-width: 280px;
            height: auto;
            transition: opacity 0.3s ease;
        }

        /* 4. BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #eee;
        }

        .nav-icon { font-size: 24px; color: #ccc; }
        .nav-icon.active { color: var(--primary-green); }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <nav class="hero-nav">
            <div style="font-weight: 700; font-size: 1.5rem;">ONTOOWN</div>
            <a href="#" class="btn-signup">Sign Up</a>
        </nav>
        <h1>Rent today.<br>Own Tomorrow.</h1>
    </header>

    <main class="branding">
        <p>Progres Anda dalam membangun masa depan dimulai di sini.</p>
        <button class="btn-discover" onclick="naikProgress()">Tingkatkan Progres</button>
    </main>

    <section class="gamify-section">
        <div class="gamify-card">
            <div class="card-header">
                <div class="progress-title">
                    <span class="star-box">✪</span> On-to-Own Progress
                </div>
                <div id="angka-progress" style="font-weight: 700; color: var(--primary-green);">33%</div>
            </div>

            <div class="progress-container">
                <div id="bar-hijau" class="progress-bar"></div>
            </div>

            <div class="status-steps">
                <div class="step active" id="step-rent">
                    <div class="step-icon">↳</div>
                    <div class="step-label">Rent Started</div>
                </div>
                <div class="step" id="step-equity">
                    <div class="step-icon">📈</div>
                    <div class="step-label">Build Equity</div>
                </div>
                <div class="step" id="step-home">
                    <div class="step-icon">🏠</div>
                    <div class="step-label">Own Your Home</div>
                </div>
            </div>

            <div class="house-display">
                <img id="house-visual" src="rumah-33.png" alt="House Progress" class="house-img">
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <div class="nav-icon active">🏠</div>
        <div class="nav-icon">🔍</div>
        <div class="nav-icon">👤</div>
    </nav>

    <script>
        let persen = 33;
        
        // Objek untuk memetakan progres ke gambar
        // Ganti URL ini dengan file gambar Anda (image_bf9e73.png dsb)
        const houseImages = {
            start: 'rumah-33.png',  // Tahap Rangka
            mid: 'rumah-66.png',    // Tahap Setengah Jadi
            final: 'rumah-100.png'  // Rumah Jadi
        };

        function naikProgress() {
            if (persen < 100) {
                persen += 33; // Naik bertahap
                if (persen > 100) persen = 100;
                
                updateUI();
            }
        }

        function updateUI() {
            const bar = document.getElementById('bar-hijau');
            const angka = document.getElementById('angka-progress');
            const img = document.getElementById('house-visual');
            
            bar.style.width = persen + "%";
            angka.innerText = persen + "%";

            // Update Ikon & Gambar Rumah berdasarkan milestone
            if (persen >= 100) {
                document.getElementById('step-home').classList.add('active');
                img.src = houseImages.final;
            } else if (persen >= 66) {
                document.getElementById('step-equity').classList.add('active');
                img.src = houseImages.mid;
            } else {
                img.src = houseImages.start;
            }
        }
    </script>

</body>
</html>
