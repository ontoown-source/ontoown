<!DOCTYPE html>
html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontoown - Housing Platform</title>
    
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* 2. SETTING DASAR */
        body {
            font-family: 'League Spartan', sans-serif; /* Pake font pilihanmu */
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        /* 3. HEADER DENGAN WARNA HIJAU KAMU */
        .navbar {
            background-color: #249170; /* Ijo #249170 */
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .logo {
            height: 40px; /* Atur tinggi logo kamu di sini */
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #249170; /* Tulisan judul pake ijo kamu juga */
            font-weight: 700;
        }

        /* Tombol Gamification Sederhana */
        .btn-gamify {
            background-color: #249170;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-family: 'League Spartan', sans-serif;
            font-size: 18px;
        }

        .btn-gamify:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="logo.PNG" alt="Ontoown Logo" class="logo">
        <div>Menu | Cari Rumah | Poin Saya</div>
    </nav>

    <div class="container">
        <h1>Selamat Datang di Ontoown 🏠</h1>
        <p>Housing platform masa depan dengan sistem gamification.</p>
        
        <button class="btn-gamify" onclick="tambahPoin()">Mulai Cari Rumah (+10 Poin!)</button>
        
        <p id="status-poin" style="margin-top: 20px; font-weight: bold;"></p>
    </div>

    <script>
        let poin = 0;
        function tambahPoin() {
            poin += 10;
            document.getElementById('status-poin').innerText = "Kamu dapat poin! Total: " + poin;
            alert("Selamat! Kamu baru saja mendapatkan 10 poin pertama di Ontoown!");
        }
    </script>

</body>
</html>
