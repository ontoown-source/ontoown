<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontoown - Rent Today, Own Tomorrow</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #249170;
            --dark-blue: #1a2538;
            --bg-gray: #f8f9fa;
        }

        body {
            font-family: 'League Spartan', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-gray);
            padding-bottom: 100px;
        }

        /* 1. TOP NAVBAR */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: white; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .logo-img { height: 30px; width: auto; }
        .btn-signup {
            background: var(--primary-green); color: white; padding: 8px 16px;
            border-radius: 20px; text-decoration: none; font-weight: 700; font-size: 0.85rem;
        }

        /* 2. HERO SECTION */
        .hero {
            height: 45vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center; color: white; text-align: center;
        }
        .hero h1 { font-size: 2.8rem; line-height: 1.1; margin: 0; font-weight: 700; }

        /* 3. PLATFORM DESCRIPTION */
        .desc-section { padding: 40px 25px; background: white; text-align: left; }
        .desc-section p { color: #555; line-height: 1.6; margin: 20px 0; font-size: 1.05rem; }
        .btn-discover {
            background: var(--primary-green); color: white; border: none;
            padding: 12px 25px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: inherit;
        }

        /* 4. PROGRESS CARD */
        .card { background: white; margin: 20px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .prog-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 12px; align-items: center; }
        .bar-bg { background: #f0f0f0; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 25px; }
        .bar-fill { background: var(--primary-green); height: 100%; width: 33%; transition: 0.8s ease-in-out; }
        
        .steps-nav { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .step-item { text-align: center; flex: 1; opacity: 0.4; transition: 0.3s; }
        .step-item.active { opacity: 1; }
        .step-icon { font-size: 1.2rem; margin-bottom: 5px; }
        .step-label { font-size: 0.7rem; font-weight: 600; }

        /* 5. LIVE FLEXIBLY (TICKET) */
        .flex-box { background: var(--dark-blue); color: white; padding: 40px 20px; text-align: center; }
        .ticket-wrap { display: flex; gap: 12px; margin-top: 25px; justify-content: center; }
        .ticket {
            background: #d1e9ff; color: #1a2538; padding: 20px 10px; border-radius: 18px; flex: 1;
            position: relative; max-width: 160px; text-align: center;
        }
        .ticket.green { background: #dcfce7; }
        .ticket::before, .ticket::after {
            content: ''; position: absolute; top: 50%; width: 18px; height: 18px;
            background: var(--dark-blue); border-radius: 50%; transform: translateY(-50%);
        }
        .ticket::before { left: -9px; } .ticket::after { right: -9px; }
        .ticket h4 { margin: 10px 0 5px; font-size: 0.9rem; font-weight: 700; color: #007bff; }
        .ticket.green h4 { color: #16a34a; }
        .ticket p { font-size: 0.65rem; margin: 0; line-height: 1.3; }

        /* 6. MORTGAGE SIMULATOR */
        .sim-container { background: white; border-radius: 20px; padding: 20px; border: 1px solid #f0f0f0; margin-top: 15px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #333; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-family: inherit;
        }
        .res-area { background: #f0fdf4; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; border: 1px dashed var(--primary-green); }
        .res-val { font-size: 1.8rem; font-weight: 700; color: var(--primary-green); margin: 5px 0; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
    </style>
</head>

        </div>
        <div class="bar-bg"><div id="p-bar" class="bar-fill"></div></div>
