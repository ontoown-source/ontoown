<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontoown - Rent Today, Own Tomorrow</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #249170;
            --dark-blue: #1a2538;
            --white: #ffffff;
            --bg-gray: #f8f9fa;
        }

        body {
            font-family: 'League Spartan', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-gray);
            padding-bottom: 90px;
        }

        /* HERO */
        .hero {
            height: 45vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 { font-size: 2.5rem; line-height: 1.1; margin: 0; }

        /* PROGRESS SECTION */
        .section-card {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .progress-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 10px; }
        .bar-bg { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 20px; }
        .bar-fill { background: var(--primary-green); height: 100%; width: 33%; transition: 0.5s; }
        .house-display { text-align: center; margin: 20px 0; }
        .house-img { width: 200px; height: auto; }

        .btn-main {
            width: 100%;
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        /* LIVE FLEXIBLY (TICKET) */
        .flex-section { background: var(--dark-blue); color: white; padding: 30px 20px; text-align: center; }
        .flex-grid { display: flex; gap: 15px; margin-top: 20px; justify-content: center; }
        
        .ticket {
            background: #d1e9ff;
            color: var(--dark-blue);
            padding: 15px;
            border-radius: 15px;
            flex: 1;
            position: relative;
            max-width: 160px;
        }
        .ticket.green { background: #dcfce7; }
        
        /* Ticket Cut-outs */
        .ticket::before, .ticket::after {
            content: ''; position: absolute; top: 50%; width: 16px; height: 16px;
            background: var(--dark-blue); border-radius: 50%; transform: translateY(-50%);
        }
        .ticket::before { left: -8px; }
        .ticket::after { right: -8px; }

        .ticket h4 { margin: 10px 0 5px; font-size: 0.9rem; }
        .ticket p { font-size: 0.65rem; margin: 0; opacity: 0.8; }

        /* MORTGAGE SIMULATOR */
        .sim-input-group { margin-bottom: 15px; }
        .sim-input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; }
        .sim-input-group input, .sim-input-group select {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;
        }

        .res-box { background: #f0fdf4; border: 1px dashed var(--primary-green); padding: 15px; border-radius: 15px; margin-top: 20px; text-align: center; }
        .res-price { font-size: 1.4rem; font-weight: 700; color: var(--primary-green); }

        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Live Flexibly.<br>Own Tomorrow.</h1>
    </section>

    <section class="section-card">
        <div class="progress-header">
            <span>✪ My Progress</span>
            <span id="txt-prog" style="color: var(--primary-green);">33%</span>
        </div>
        <div class="bar-bg"><div id="bar-fill" class="bar-fill"></div></div>
        <div class="house-display">
            <img id="house-img" src="rumah-33.png" class="house-img" alt="Progress">
        </div>
        <button class="btn-main" onclick="updateProgress()" style="background: #e8f4f1; color: var(--primary-green);">Tingkatkan Progres</button>
    </section>

    <section class="flex-section">
        <h2 style="margin: 0;">Live Flexibly</h2>
        <p style="font-size: 0.8rem; opacity: 0.7;">Try a unit before committing by renting daily.</p>
        <div class="flex-grid">
            <div class="ticket">
                <span style="font-size: 1.2rem;">🏢</span>
                <h4>Trial Stay Pass</h4>
                <p>Valid for New User only</p>
            </div>
            <div class="ticket green">
                <span style="font-size: 1.2rem;">🏠</span>
                <h4>Rotation</h4>
                <p>Valid for Ontoown Renters</p>
            </div>
        </div>
    </section>

    <section class="section-card">
        <h2 style="margin: 0 0 15px 0;">Mortgage Simulator</h2>
        
        <div class="sim-input-group">
            <label>Harga Properti (Rp)</label>
            <input type="number" id="p-price" value="500000000">
        </div>

        <div class="sim-input-group">
            <label>Jangka Waktu: <span id="y-val">15</span> Tahun</label>
            <input type="range" id="p-years" min="1" max="30" value="15" oninput="document.getElementById('y-val').innerText = this.value">
        </div>

        <div class="sim-input-group">
            <label>Jenis Bunga</label>
            <select id="p-type">
                <option value="anuitas">Anuitas (Efektif)</option>
                <option value="flat">Flat</option>
            </select>
        </div>

        <button class="btn-main" onclick="calcMortgage()">Cek Estimasi Cicilan</button>

        <div class="res-box">
            <div style="font-size: 0.9rem; color: #666;">Estimasi Cicilan Bulanan:</div>
            <div class="res-price" id="res-install">Rp 0</div>
        </div>
    </section>

    <nav class="bottom-nav">
        <div style="color: var(--primary-green); font-size: 1.5rem;">🏠</div>
        <div style="font-size: 1.5rem;">🔍</div>
        <div style="font-size: 1.5rem;">👤</div>
    </nav>

    <script>
        // LOGIKA PROGRESS
        let p = 33;
        const imgs = { s: 'rumah-33.png', m: 'rumah-66.png', f: 'rumah-100.png' };

        function updateProgress() {
            if (p < 100) {
                p += 33; if (p > 100) p = 100;
                document.getElementById('bar-fill').style.width = p + "%";
                document.getElementById('txt-prog').innerText = p + "%";
                const i = document.getElementById('house-img');
                if (p >= 100) i.src = imgs.f;
                else if (p >= 66) i.src = imgs.m;
            }
        }

        // LOGIKA MORTGAGE
        function calcMortgage() {
            const price = parseFloat(document.getElementById('p-price').value);
            const loan = price * 0.9; // Asumsi DP 10%
            const years = parseInt(document.getElementById('p-years').value);
            const rate = 0.06; // Bunga 6%
            const type = document.getElementById('p-type').value;
            let result = 0;

            if (type === 'flat') {
                result = (loan + (loan * rate * years)) / (years * 12);
            } else {
                const mRate = rate / 12;
                const mTotal = years * 12;
                result = loan * (mRate / (1 - Math.pow(1 + mRate, -mTotal)));
            }
            document.getElementById('res-install').innerText = "Rp " + Math.round(result).toLocaleString('id-ID');
        }
    </script>
</body>
</html>
