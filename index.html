<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontoown - Housing Platform</title>
    
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'League Spartan', sans-serif;
            margin: 0;
            background-color: #f9f9f9;
        }

        /* BAR PUTIH BIAR LOGO KELIHATAN JELAS */
        .navbar {
            background-color: white; 
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #249170; /* Tulisan jadi warna ijo kamu */
            border-bottom: 2px solid #249170; /* Garis ijo tipis di bawah */
        }

        .logo {
            height: 45px; /* Sesuaikan tinggi logo */
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .btn-gamify {
            background-color: #249170;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-family: 'League Spartan', sans-serif;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="logo.PNG" alt="Ontoown Logo" class="logo">
        <div style="font-weight: bold;">Menu | Cari Rumah | Poin Saya</div>
    </nav>

    <div class="container">
        <h1 style="color: #249170;">Selamat Datang di Ontoown 🏠</h1>
        <p>Housing platform masa depan dengan sistem gamification.</p>
        <button class="btn-gamify" onclick="tambahPoin()">Mulai Cari Rumah (+10 Poin!)</button>
        <p id="status-poin" style="margin-top: 20px; font-weight: bold;"></p>
    </div>

    <script>
        let poin = 0;
        function tambahPoin() {
            poin += 10;
            document.getElementById('status-poin').innerText = "Kamu dapat poin! Total: " + poin;
            alert("Selamat! Kamu baru saja mendapatkan 10 poin pertama di Ontoown!");
        }
    </script>
</body>
</html>
